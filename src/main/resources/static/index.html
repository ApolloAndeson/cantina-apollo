<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credito Cantina - Login</title>
</head>
<body>
<h1>Credito Cantina</h1>
<input type="text" id="matriculaInput" placeholder="Martricula"><br>
<input type="password" id="senhaInput" placeholder="Senha"><br>
<button onclick="fazerLogin()">Entrar</button>
</body>
<script>
    function fazerLogin() {
        let matricula = document.getElementById("matriculaInput").value;
        let senha = document.getElementById("senhaInput").value;

        // O 'fetch' leva os dados até o seu Controller no Java
        fetch('/cartoes/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            // Transformamos os dados em um texto JSON
            body: JSON.stringify({
                matricula: matricula,
                senha: senha
            })
        })
            .then(response => {
                if (response.ok) {
                    alert("Login realizado! Entrando no sistema...");
                    // Aqui depois vamos redirecionar para a tela de saldo
                } else {
                    alert("Matrícula ou senha incorretos!");
                }
            })
            .catch(erro => {
                console.error("Erro ao conectar:", erro);
                alert("O servidor Java está desligado?");
            });
    }
</script>
</html>
