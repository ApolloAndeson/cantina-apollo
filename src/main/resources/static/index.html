<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credito Cantina - Login</title>
    <style>
        /* Estilo Dark Mode Moderno */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            color: #3b82f6;
            margin-bottom: 30px;
            font-size: 28px;
        }

        input {
            background-color: #2a2a2a;
            color: #ffffff;
            margin: 10px 0;
            padding: 14px;
            width: 300px;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #3b82f6;
            outline: none;
        }

        input::placeholder {
            color: #777;
        }

        button {
            background-color: #3b82f6;
            color: white;
            padding: 14px;
            width: 330px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #2563eb;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Credito Cantina</h1>
    <input type="text" id="matriculaInput" placeholder="Matrícula">
    <br>
    <input type="password" id="senhaInput" placeholder="Senha">
    <br>
    <button onclick="fazerLogin()">Entrar</button>
</div>

<script>
    function fazerLogin() {
        let matriculaDigitada = document.getElementById("matriculaInput").value;
        let senhaDigitada = document.getElementById("senhaInput").value;

        fetch('/cartoes/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                matricula: matriculaDigitada,
                senha: senhaDigitada
            })
        })
            .then(response => {
                if (response.ok) {
                    // --- O SEGREDO ESTÁ AQUI ---
                    // 1. Salva a matrícula na memória do navegador
                    localStorage.setItem("matriculaLogada", matriculaDigitada);

                    // 2. Redireciona para a página do Dashboard
                    window.location.href = "dashboard.html";
                } else {
                    alert("Ops! Matrícula ou senha incorretos.");
                }
            })
            .catch(erro => {
                console.error("Erro na conexão:", erro);
                alert("Erro ao conectar com o servidor Java.");
            });
    }
</script>

</body>
</html>
